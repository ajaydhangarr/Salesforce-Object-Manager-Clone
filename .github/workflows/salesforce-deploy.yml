name: Salesforce CI/CD Pipeline

on:
  push:
    branches:
      - main          # ← apni branch ka naam daal
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      from_ref:
        description: "Base commit/ref for delta (leave blank for HEAD~1)"
        required: false
        default: ""
      force_full_deploy:
        description: "Force full deployment of all metadata?"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: salesforce-deploy-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: >
      ${{ github.event_name == 'pull_request' && 'Validate PR' || 'Deploy to Org' }}
    runs-on: ubuntu-latest
    environment: >
      ${{ github.event_name != 'pull_request' && 'production' || '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm install --no-audit --no-fund

      - name: Run ESLint (LWC)
        run: npm run lint

      - name: Run LWC Unit Tests
        run: npm run test:unit

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install Delta Deployment Plugin
        run: echo y | sf plugins install sfdx-git-delta

      - name: Install Salesforce Code Analyzer (Scanner)
        run: echo y | sf plugins install @salesforce/sfdx-scanner

      - name: Generate Delta Package
        id: delta
        run: |
          mkdir -p changed-sources

          # Get empty tree SHA dynamically (typically 4b825dc642cb6eb9a060e54bf8d69288fbee4904)
          EMPTY_TREE_SHA=$(git hash-object -w -t tree /dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")
          echo "Empty tree SHA: $EMPTY_TREE_SHA"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM_COMMIT="${{ github.event.pull_request.base.sha }}"
            TO_COMMIT="${{ github.event.pull_request.head.sha }}"
          else
            FROM_COMMIT="${{ github.event.inputs.from_ref || github.event.before }}"
            TO_COMMIT="${{ github.sha }}"
          fi

          if [ "${{ github.event.inputs.force_full_deploy }}" = "true" ]; then
            echo "Force full deploy requested. Diffing against empty tree."
            FROM_COMMIT="$EMPTY_TREE_SHA"
          fi

          if [ -z "$FROM_COMMIT" ] || [ "$FROM_COMMIT" = "0000000000000000000000000000000000000000" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD)
            if [ "$COMMIT_COUNT" -le 1 ]; then
              echo "First commit — deploying full force-app"
              FROM_COMMIT="$EMPTY_TREE_SHA"
            else
              FROM_COMMIT="HEAD~1"
            fi
          fi

          if [ "$FROM_COMMIT" != "$EMPTY_TREE_SHA" ] && ! git cat-file -e "${FROM_COMMIT}" 2>/dev/null; then
            echo "WARNING: FROM_COMMIT not found, falling back to HEAD~1"
            FROM_COMMIT="HEAD~1"
          fi

          echo "From : $FROM_COMMIT"
          echo "To   : $TO_COMMIT"

          sf sgd source delta \
            --from "$FROM_COMMIT" \
            --to "$TO_COMMIT" \
            --output-dir changed-sources \
            --generate-delta \
            --source-dir force-app

          echo "Generated delta package.xml:"
          cat changed-sources/package/package.xml

          if grep -q "<types>" changed-sources/package/package.xml; then
            echo "should_deploy=true"        >> "$GITHUB_OUTPUT"
            echo "from_commit=$FROM_COMMIT"  >> "$GITHUB_OUTPUT"
            echo "to_commit=$TO_COMMIT"      >> "$GITHUB_OUTPUT"
          else
            echo "No deployable Salesforce metadata changes found."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No Changes to Deploy
        if: steps.delta.outputs.should_deploy != 'true'
        run: |
          echo "## ⏭️ Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "No deployable Salesforce metadata changes detected." >> "$GITHUB_STEP_SUMMARY"

      - name: Detect Apex Test Scope
        if: steps.delta.outputs.should_deploy == 'true'
        id: tests
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ steps.delta.outputs.from_commit }}" "${{ steps.delta.outputs.to_commit }}")"

          TEST_CLASSES="$(
            echo "$CHANGED_FILES" |
              grep -E '^force-app/.*/classes/[^/]*Test\.cls$' |
              while read -r file; do
                [ -f "$file" ] && echo "$file"
              done |
              sed -E 's#.*/([^/]+)\.cls#\1#' |
              grep -v '^$' |
              sort -u |
              paste -sd' ' -
          )"

          APEX_CHANGED="$(
            echo "$CHANGED_FILES" |
              grep -E '^force-app/.*/(classes/[^/]+\.cls|triggers/[^/]+\.trigger)$' || true
          )"

          if [ -n "$TEST_CLASSES" ]; then
            TEST_LEVEL="RunSpecifiedTests"
          elif [ -n "$APEX_CHANGED" ]; then
            TEST_LEVEL="RunLocalTests"
          else
            TEST_LEVEL="NoTestRun"
          fi

          echo "test_level=$TEST_LEVEL"     >> "$GITHUB_OUTPUT"
          echo "test_classes=$TEST_CLASSES" >> "$GITHUB_OUTPUT"

      - name: Run Static Code Analysis
        if: steps.delta.outputs.should_deploy == 'true'
        run: |
          CHANGED_APEX="$(git diff --name-only "${{ steps.delta.outputs.from_commit }}" "${{ steps.delta.outputs.to_commit }}" | grep -E '^force-app/.*(classes/[^/]+\.cls|triggers/[^/]+\.trigger)$' || true)"

          if [ -n "$CHANGED_APEX" ]; then
            TARGETS=$(echo "$CHANGED_APEX" | paste -sd "," -)
            echo "Scanning: $TARGETS"
            sf scanner run --target "$TARGETS" --engine "pmd" --severity-threshold 2
          else
            echo "No Apex files modified — skipping static analysis."
          fi

      # ✅ Sirf ek secret — SFDX_AUTH_URL
      - name: Authenticate to Salesforce Org
        if: steps.delta.outputs.should_deploy == 'true'
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdx_auth_url.txt
          trap 'rm -f sfdx_auth_url.txt' EXIT
          sf org login sfdx-url \
            --sfdx-url-file sfdx_auth_url.txt \
            --alias target-org

      - name: Validate Deployment
        if: steps.delta.outputs.should_deploy == 'true'
        id: validate
        run: |
          TEST_LEVEL="${{ steps.tests.outputs.test_level }}"
          TEST_CLASSES="${{ steps.tests.outputs.test_classes }}"

          if [ "$TEST_LEVEL" = "RunSpecifiedTests" ]; then
            sf project deploy validate \
              --manifest changed-sources/package/package.xml \
              --target-org target-org \
              --test-level RunSpecifiedTests \
              --tests $TEST_CLASSES \
              --json > validate-result.json || true
          elif [ "$TEST_LEVEL" = "RunLocalTests" ]; then
            sf project deploy validate \
              --manifest changed-sources/package/package.xml \
              --target-org target-org \
              --test-level RunLocalTests \
              --json > validate-result.json || true
          else
            sf project deploy validate \
              --manifest changed-sources/package/package.xml \
              --target-org target-org \
              --test-level NoTestRun \
              --json > validate-result.json || true
          fi

          echo "=== FULL VALIDATE OUTPUT ==="
          cat validate-result.json

          echo "=== COMPONENT FAILURES ==="
          jq -r '.result.details.componentFailures[]? | "[\(.problemType)] \(.fileName): \(.problem)"' validate-result.json || true

          echo "=== TEST FAILURES ==="
          jq -r '.result.details.runTestResult.failures[]? | "[\(.type)] \(.name).\(.methodName): \(.message)"' validate-result.json || true

          DEPLOY_ID=$(jq -r '.result.id // empty' validate-result.json)
          STATUS=$(jq -r '.result.status // empty' validate-result.json)

          if [ -z "$DEPLOY_ID" ] || [ "$STATUS" != "Succeeded" ]; then
            echo "ERROR: Validation failed. Status: $STATUS"
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Validation successful. Deploy ID: $DEPLOY_ID"

      - name: Quick Deploy
        if: >
          github.event_name != 'pull_request' &&
          steps.delta.outputs.should_deploy == 'true' &&
          steps.validate.outcome == 'success' &&
          steps.validate.outputs.deploy_id != ''
        run: |
          sf project deploy quick \
            --job-id "${{ steps.validate.outputs.deploy_id }}" \
            --target-org target-org

      - name: PR Validation Summary
        if: github.event_name == 'pull_request' && steps.delta.outputs.should_deploy == 'true'
        run: |
          echo "## ✅ PR Validation Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Level | ${{ steps.tests.outputs.test_level }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Classes | ${{ steps.tests.outputs.test_classes || 'N/A' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validation Status | Passed ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Code is safe to merge." >> "$GITHUB_STEP_SUMMARY"